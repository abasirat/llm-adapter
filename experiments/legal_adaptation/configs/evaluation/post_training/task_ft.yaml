# Post-training hyperparameters for task-specific adapter fine-tuning.
# Shared across casehold, ledgar, and unfair_tos; override per-task in
# legal_eval.yaml if needed.

num_epochs: 3
learning_rate: 1.0e-4

batch_size: 8
dev_batch_size: 8
context_size: 512        # shorter than domain pre-training; task examples are shorter
num_workers: 0

adam_beta1: 0.9
adam_beta2: 0.999
weight_decay: 0.01
gradient_clip_norm: 1.0

val_fraction: 0.1        # fraction of the training split held out for early stopping
val_interval: 50
early_stopping_patience: 3
early_stopping_min_delta: 1.0e-4
progress_interval: 10

# KL regularisation is not needed for supervised task fine-tuning.
kl_loss_weight: 0.0
kl_warmup_fraction: 0.0
kl_schedule: linear

use_amp: true

seed: 42

wandb:
  enabled: false         # wandb is disabled during post-training; use eval output_file
