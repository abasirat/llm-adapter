# Task data config for LEDGAR post-training.
#
# Each training example is formatted as:
#   "Contract provision: <text>\nCategory: <label_name>"
#
# This matches the prompt format used by the LEDGAR evaluator so that the
# adapter learns to predict the correct label given the provision text.

dataset_name: lex_glue
dataset_config: ledgar
task: ledgar              # triggers _apply_task_formatter in prepare_dataset.py

train_split: train
validation_split: validation

max_train_examples: null
max_validation_examples: null

tokenizer_name: gpt2
streaming: false
