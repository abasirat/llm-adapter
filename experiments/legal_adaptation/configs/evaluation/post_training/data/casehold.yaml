# Task data config for CaseHOLD post-training.
#
# Each training example is formatted as:
#   "<context with <HOLDING> replaced by \nHolding:> <correct_ending>"
#
# This matches the prompt format used by the CaseHOLD evaluator so that the
# adapter learns to generate the correct holding in the expected format.

dataset_name: lex_glue
dataset_config: case_hold
split: train
task: casehold            # triggers _apply_task_formatter in prepare_dataset.py

tokenizer_name: gpt2
output_prefix: outputs/post_training_data/casehold
max_bin_size_gb: 1.0
streaming: false
