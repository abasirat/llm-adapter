# Task data config for UNFAIR-ToS post-training.
#
# Each training example is formatted as:
#   "Terms of service clause: <text>"
#
# UNFAIR-ToS is a multi-label task (8 binary categories per clause), which
# makes prompt-based label conditioning complex.  Training on the text
# distribution of ToS clauses adapts the model to the domain and supports
# the likelihood-based scoring used by the evaluator.

dataset_name: lex_glue
dataset_config: unfair_tos
split: train
task: unfair_tos          # triggers _apply_task_formatter in prepare_dataset.py

tokenizer_name: gpt2
output_prefix: outputs/post_training_data/unfair_tos
max_bin_size_gb: 0.5      # UNFAIR-ToS training split is small (~5K examples)
streaming: false
